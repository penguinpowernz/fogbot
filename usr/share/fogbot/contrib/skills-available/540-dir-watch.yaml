id: 540
name: dir-watch
description: >
  Alert on new files or directories added to watched folders using auditd.
  Monitors configured paths for file creation and modification events.
  Provides user/process context that inotify cannot.
why: >
  Attackers frequently stage tools, scripts, and payloads in
  sensitive directories before execution. A new file appearing
  in /usr/local/bin/, /etc/cron.d/, or /root/ outside of a
  maintenance window is a strong indicator of compromise or
  persistence activity. This skill catches the delivery phase.
requires:
  - auditd
  - root
tags: [filesystem, persistence, delivery, auditd]
severity_default: red
requires_approval: true
config:
  watch_paths:
    - /usr/local/bin/
    - /etc/cron.d/
    - /root/
  recursive: false
  glob_filter: ""
  whitelist: []
