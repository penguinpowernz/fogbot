version: '3.8'

services:
  fogbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fogbot-test
    hostname: fogbot-test
    environment:
      - FOGBOT_CONFIG=/etc/fogbot/config.yaml
      - FOGBOT_STATE_DIR=/var/lib/fogbot
      - FOGBOT_SKILLS_AVAILABLE=/etc/fogbot/skills-available
      - FOGBOT_SKILLS_ENABLED=/etc/fogbot/skills-enabled
      - FOGBOT_DRY_RUN=true
      # Add your Telegram bot token here for testing
      # - TELEGRAM_BOT_TOKEN=your_token_here
      # If you get TLS certificate errors, uncomment this (TESTING ONLY!):
      # - FOGBOT_INSECURE_TLS=true
    volumes:
      # Mount only fogbot config, not entire /etc (preserves system files like CA certs)
      - ./etc/fogbot:/etc/fogbot
      - ./usr/local/bin/fogbot:/usr/local/bin/fogbot
      - fogbot-state:/var/lib/fogbot
      - fogbot-logs:/var/log/fogbot
    # Capabilities for monitoring (adjust based on skills)
    cap_add:
      - NET_ADMIN
      - AUDIT_CONTROL
      - SYS_PTRACE
    # Run in foreground for docker-compose
    # command: ["/bin/bash"]
    command: ["sleep", "36000"]
#    command: ["/usr/local/bin/fogbot", "daemon"]
    restart: unless-stopped

volumes:
  fogbot-state:
  fogbot-logs:
